<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список справ</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="main-to-do-list" v-cloak>
        <h1 v-bind:style="{color: note.length > 15 ? 'red' : 'navy', fontStyle: note.length > 10 ? 'italic': 'normal'}">{{title}}</h1>
        <input placeholder="Введіть свою справу..." v-on:keyup.enter="Add()" 
            v-model="note" 
            type="text" 
            class="inp-note"
            >
        <p class="p-note">{{note}}</p>
        <button v-bind:disabled="note == '' || note == ' '  "  class="btn-add" v-on:click="Add()">Додати</button>
        <ul class="list-note">
            <li class="list-item" v-for="(el, i) in notesArr">
                {{i+1}}. {{el}}
                <button class="del-btn" v-on:click="Delete(i)">Виконано</button>
            </li>
        </ul>
        <div class="empty" v-if="notesArr.length == 0">
            <p>ви ще не додали вожної нотатки</p>
        </div>
    </div>


    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="script.js"></script>
</body>

</html>
